    // Анонимная авторизация (чтобы у каждого был свой uid и своя копилка)
    async function ensureAuth() {
      if (auth.currentUser) return auth.currentUser.uid;

      const existingUid = await new Promise((resolve) => {
        const unsub = auth.onAuthStateChanged((u) => {
          unsub();
          resolve(u?.uid || null);
        });
      });
      if (existingUid) return existingUid;

      const res = await auth.signInAnonymously();
      return res.user.uid;
    }

    // Debounce чтобы не спамить записью при каждом клике
    function debounce(fn, ms = 400) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }
    const {useState,useEffect} = React;

    const HABITS_LIBRARY=[
      {id:"h1",title:"Правило 24 часов",emoji:"⏳",desc:"Перед покупкой дороже 2000₽ — подожди сутки.",science:"Journal of Consumer Research: задержка снижает эмоциональную привязку к покупке.",category:"траты",difficulty:1,savingsPerMonth:3000},
      {id:"h2",title:"Утренний кофе дома",emoji:"☕",desc:"Готовь кофе дома. Экономия ~200₽/день.",science:"«Латте-фактор» Дэвида Баха: мелкие ежедневные траты съедают до 15% дохода.",category:"траты",difficulty:1,savingsPerMonth:4500},

      {id:"h4",title:"Список перед магазином",emoji:"📝",desc:"Ходи в магазин только со списком.",science:"Планирование покупок снижает траты на 20-30% (Nielsen).",category:"траты",difficulty:1,savingsPerMonth:3500},
      {id:"h5",title:"Без подписок-зомби",emoji:"🧟",desc:"Раз в месяц проверяй и отключай неиспользуемые подписки.",science:"Средний россиянин тратит ~1500₽/мес на забытые подписки.",category:"траты",difficulty:1,savingsPerMonth:1500},

      {id:"c2",title:"Без маркетплейсов",emoji:"📦",days:14,desc:"Две недели без онлайн-шопинга",reward:80,savingsEst:8000},

      {q:"Кешбэк-карты всегда экономят деньги",a:false,explain:"Кешбэк провоцирует тратить на 20-30% больше."},
      {q:"Записывать расходы — пустая трата времени",a:false,explain:"Учёт расходов снижает траты на 15-20% в первый же месяц."},
      {q:"Маленькие траты не влияют на бюджет",a:false,explain:"200₽/день = 73 000₽/год. Это отпуск!"},
      {q:"Скидка 50% — это экономия",a:false,explain:"Если вещь не в плане — вы потратили 50%, а не сэкономили."},
      {q:"Автоперевод на накопления эффективнее ручного",a:true,explain:"Автоматизация увеличивает накопления на 35%."},

    const EXPENSE_CATEGORIES=[{id:"food",emoji:"🍔",name:"Еда"},{id:"transport",emoji:"🚕",name:"Транспорт"},{id:"fun",emoji:"🎮",name:"Развлечения"},{id:"clothes",emoji:"👕",name:"Одежда"},{id:"health",emoji:"💊",name:"Здоровье"},{id:"other",emoji:"📎",name:"Другое"}];

    function CoinIcon({size=20}){return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#FFD93D" stroke="#F0B90B" strokeWidth="2"/><text x="12" y="16" textAnchor="middle" fontSize="11" fontWeight="bold" fill="#B8860B">₽</text></svg>)}
    function PiggyBank({size=80,fillPct=0}){const s=1+fillPct*.35,ch=3+fillPct*2,col=fillPct>.7?"#FFD93D":fillPct>.3?"#FFCAD4":"#FFB5C2";return(<svg width={size} height={size} viewBox="0 0 100 100" fill="none"><g transform={`translate(50,52) scale(${s}) translate(-50,-52)`}><ellipse cx="50" cy="52" rx="32" ry="26" fill={col} stroke="#E8899A" strokeWidth="2.5"/><circle cx="38" cy="44" r="2.5" fill="#333"/><circle cx="38" cy="44" r="1" fill="#fff"/><ellipse cx="62" cy="54" rx={ch+2} ry={ch} fill="#FF9AAF" stroke="#E8899A" strokeWidth="1.5"/><circle cx="60.5" cy="53" r="1.2" fill="#E8899A"/><circle cx="63.5" cy="53" r="1.2" fill="#E8899A"/><path d="M26 68 L22 80" stroke="#E8899A" strokeWidth="3" strokeLinecap="round"/><path d="M38 72 L36 80" stroke="#E8899A" strokeWidth="3" strokeLinecap="round"/><path d="M62 72 L64 80" stroke="#E8899A" strokeWidth="3" strokeLinecap="round"/><path d="M74 68 L78 80" stroke="#E8899A" strokeWidth="3" strokeLinecap="round"/><path d="M30 36 Q26 24 34 28" stroke="#E8899A" strokeWidth="2.5" fill={col}/><path d="M42 34 Q44 22 48 30" stroke="#E8899A" strokeWidth="2.5" fill={col}/></g><rect x="38" y={28-fillPct*4} rx="3" ry="2" width="16" height="6" fill="#FFD93D" stroke="#F0B90B" strokeWidth="1.5"/>{fillPct>.5&&<text x="50" y="18" textAnchor="middle" fontSize="14">✨</text>}{fillPct>=1&&<text x="50" y="10" textAnchor="middle" fontSize="12">🎉</text>}</svg>)}
    function useWidth(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);return w}

    function App(){
      const w=useWidth();const isD=w>=900;const isW=w>=1200;
      const [uid, setUid] = useState(null);
      const [cloudReady, setCloudReady] = useState(false);
      const[screen,setScreen]=useState("home");
      const[myHabits,setMyHabits]=useState([]);const[checkedToday,setCheckedToday]=useState({});
      const[streak,setStreak]=useState(0);const[totalSaved,setTotalSaved]=useState(0);const[coins,setCoins]=useState(0);
      const[selectedCategory,setSelectedCategory]=useState("все");const[showScience,setShowScience]=useState(null);
      const[showNewHabit,setShowNewHabit]=useState(false);const[newHabit,setNewHabit]=useState({title:"",desc:"",emoji:"💡",savingsPerMonth:0});
      const[customHabits,setCustomHabits]=useState([]);const[tipIndex,setTipIndex]=useState(0);
      const[showAch,setShowAch]=useState(null);const[unlockedAch,setUnlockedAch]=useState([]);const[coinAnim,setCoinAnim]=useState(false);
      const[hourlyRate,setHourlyRate]=useState("");const[calcPrice,setCalcPrice]=useState("");
      const[goals,setGoals]=useState([{id:"g1",title:"Подушка безопасности",emoji:"🛡️",target:100000,saved:0}]);
      const[showNewGoal,setShowNewGoal]=useState(false);const[newGoal,setNewGoal]=useState({title:"",emoji:"🎯",target:""});
      const[activeCh,setActiveCh]=useState({});
      const[quizIdx,setQuizIdx]=useState(0);const[quizAns,setQuizAns]=useState(null);const[quizScore,setQuizScore]=useState(0);const[quizDone,setQuizDone]=useState(false);
      const[expenses,setExpenses]=useState([]);const[showAddExp,setShowAddExp]=useState(false);const[newExp,setNewExp]=useState({amount:"",category:"food",note:""});

      useEffect(() => {
        (async () => {
          const userId = await ensureAuth();
          setUid(userId);

          const ref = db.collection("users").doc(userId);
          const snap = await ref.get();

          if (snap.exists) {
            const data = snap.data();

            setCoins(data.coins ?? 0);
            setTotalSaved(data.totalSaved ?? 0);
            setStreak(data.streak ?? 0);

            setMyHabits(data.myHabits ?? initialHabits);
            setCustomHabits(data.customHabits ?? []);
            setCheckedToday(data.checkedToday ?? {});
            setUnlockedAch(data.unlockedAch ?? []);
            setGoals(data.goals ?? []);
            setActiveCh(data.activeCh ?? {});
            setExpenses(data.expenses ?? []);
          } else {
            // если первый запуск — создаём документ
            await ref.set({
              coins,
              totalSaved,
              streak,
              myHabits: initialHabits,
              customHabits: [],
              checkedToday: {},
              unlockedAch: [],
              goals: [],
              activeCh: {},
              expenses: [],
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }

          setCloudReady(true);
        })();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);
      useEffect(()=>{const t=setInterval(()=>setTipIndex(p=>(p+1)%TIPS.length),8000);return()=>clearInterval(t)},[]);
      useEffect(()=>{ACHIEVEMENTS.forEach(a=>{if(unlockedAch.includes(a.id))return;let ok=false;if(a.type==="habits"&&myHabits.length>=a.need)ok=true;if(a.type==="streak"&&streak>=a.need)ok=true;if(a.type==="savings"&&totalSaved>=a.need)ok=true;if(ok){setUnlockedAch(p=>[...p,a.id]);setShowAch(a);setCoins(p=>p+10);setTimeout(()=>setShowAch(null),3000)}})},[myHabits.length,streak,totalSaved]);

      const animCoin=()=>{setCoinAnim(true);setTimeout(()=>setCoinAnim(false),600)};
      const addHabit=h=>{if(myHabits.find(x=>x.id===h.id))return;setMyHabits(p=>[...p,h]);setCoins(p=>p+2);animCoin()};
      const removeHabit=id=>{setMyHabits(p=>p.filter(h=>h.id!==id));setCheckedToday(p=>{const n={...p};delete n[id];return n})};
      const toggleCheck=id=>{const h=myHabits.find(x=>x.id===id);setCheckedToday(p=>{const n={...p,[id]:!p[id]};if(!p[id]){setCoins(c=>c+5);setTotalSaved(s=>s+Math.round((h?.savingsPerMonth||1000)/30));animCoin();if(Object.values(n).filter(Boolean).length===myHabits.length&&myHabits.length>0)setStreak(s=>s+1)}return n})};
      const addCustom=()=>{if(!newHabit.title.trim())return;const h={id:"c_"+Date.now(),title:newHabit.title,emoji:newHabit.emoji||"💡",desc:newHabit.desc||"Моя привычка",science:"",category:"мои",difficulty:1,savingsPerMonth:Number(newHabit.savingsPerMonth)||1000};setCustomHabits(p=>[...p,h]);addHabit(h);setNewHabit({title:"",desc:"",emoji:"💡",savingsPerMonth:0});setShowNewHabit(false)};
      const startCh=c=>{setActiveCh(p=>({...p,[c.id]:{progress:0,total:c.days}}));setCoins(p=>p+5)};
      const tickCh=cid=>{setActiveCh(p=>{const ch={...p[cid],progress:p[cid].progress+1};const c=CHALLENGES.find(x=>x.id===cid);if(ch.progress>=ch.total){setCoins(v=>v+(c?.reward||20));setTotalSaved(s=>s+(c?.savingsEst||0));const n={...p};delete n[cid];return n}return{...p,[cid]:ch}})};
      const addGoalSaving=(gid,amt)=>{setGoals(p=>p.map(g=>g.id===gid?{...g,saved:Math.min(g.saved+amt,g.target)}:g));setTotalSaved(s=>s+amt);setCoins(c=>c+3);animCoin()};
      const createGoal=()=>{if(!newGoal.title.trim()||!newGoal.target)return;setGoals(p=>[...p,{id:"g_"+Date.now(),title:newGoal.title,emoji:newGoal.emoji,target:Number(newGoal.target),saved:0}]);setNewGoal({title:"",emoji:"🎯",target:""});setShowNewGoal(false)};
      const ansQuiz=ans=>{const ok=QUIZ_DATA[quizIdx].a===ans;setQuizAns({correct:ok,explain:QUIZ_DATA[quizIdx].explain});if(ok){setQuizScore(s=>s+1);setCoins(c=>c+3)}};
      const nextQuiz=()=>{if(quizIdx+1>=QUIZ_DATA.length){setQuizDone(true);return}setQuizIdx(i=>i+1);setQuizAns(null)};
      const resetQuiz=()=>{setQuizIdx(0);setQuizAns(null);setQuizScore(0);setQuizDone(false)};
      const addExpense=()=>{if(!newExp.amount)return;setExpenses(p=>[{id:"e_"+Date.now(),...newExp,amount:Number(newExp.amount),date:new Date().toLocaleDateString("ru")},...p]);setNewExp({amount:"",category:"food",note:""});setShowAddExp(false)};

      const totExp=expenses.reduce((s,e)=>s+e.amount,0);
      const expByCat=EXPENSE_CATEGORIES.map(c=>({...c,total:expenses.filter(e=>e.category===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
      const allH=[...HABITS_LIBRARY,...customHabits];
      const filtH=selectedCategory==="все"?allH:selectedCategory==="мои"?customHabits:allH.filter(h=>h.category===selectedCategory);
      const chkCnt=Object.values(checkedToday).filter(Boolean).length;
      const prgPct=myHabits.length>0?Math.round(chkCnt/myHabits.length*100):0;
      const level=Math.floor(coins/30)+1;const xp=coins%30;
      const wHours=(hourlyRate&&calcPrice)?(Number(calcPrice)/Number(hourlyRate)).toFixed(1):null;

      const C={background:"white",borderRadius:20,padding:isD?24:18,boxShadow:"0 2px 16px rgba(0,0,0,.04)",border:"1px solid rgba(0,0,0,.05)"};
      const B=(bg="#E8899A")=>({border:"none",borderRadius:14,cursor:"pointer",fontWeight:800,fontSize:13,fontFamily:"'Nunito',sans-serif",background:`linear-gradient(135deg,${bg},${bg}dd)`,color:"white",boxShadow:`0 4px 12px ${bg}40`,padding:"10px 20px"});

      const cp=isD?"32px 40px":"16px";const g2=isD?"1fr 1fr":"1fr";const g3=isW?"1fr 1fr 1fr":isD?"1fr 1fr":"1fr";

      const saveToCloud = useMemo(() => debounce(async (payload) => {
      if (!uid) return;
        await db.collection("users").doc(uid).set(
          { ...payload, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      }, 500), [uid]);

      useEffect(() => {
        if (!cloudReady) return;

        saveToCloud({
          coins,
          totalSaved,
          streak,

          </div>}

          {/* ═══ GOALS ═══ */}
          {screen==="goals"&&<div style={{padding:cp,animation:"fadeSlide .3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:isD?24:16}}>{isD?<h1 style={{fontFamily:"'Comfortaa',cursive",fontSize:28,color:"#4A3728"}}>Цели и челленджи</h1>:<div style={{fontWeight:800,fontSize:18,color:"#4A3728"}}>🎯 Цели</div>}<button className="action-btn" onClick={()=>setShowNewGoal(true)} style={{...B(),padding:"10px 20px",fontSize:13}}>+ Цель</button></div>
            <div style={{display:"grid",gridTemplateColumns:g2,gap:isD?20:16,marginBottom:isD?32:20}}>
              {goals.map(g=>{const pct=g.target>0?g.saved/g.target:0;return(<div key={g.id} style={{...C}}><div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}><PiggyBank size={isD?80:70} fillPct={pct}/><div style={{flex:1}}><div style={{fontWeight:800,fontSize:17,color:"#4A3728"}}>{g.emoji} {g.title}</div><div style={{fontSize:22,fontWeight:900,color:"#64B478",marginTop:4}}>{g.saved.toLocaleString()} <span style={{fontSize:13,color:"#A89080"}}>/ {g.target.toLocaleString()}₽</span></div></div></div>
                <div style={{height:12,background:"rgba(0,0,0,.05)",borderRadius:6,overflow:"hidden",marginBottom:12}}><div style={{width:`${pct*100}%`,height:"100%",background:pct>=1?"linear-gradient(90deg,#FFD93D,#FFB347)":"linear-gradient(90deg,#64B478,#A8E6CF)",borderRadius:6,transition:"width .6s cubic-bezier(.34,1.56,.64,1)",animation:pct>=1?"pulse 1s ease infinite":"none"}}/></div>
                <div style={{fontSize:12,color:"#8A7B70",fontWeight:700,textAlign:"center",marginBottom:12}}>{pct>=1?"🎉 Готово!":`${(pct*100).toFixed(0)}% — ещё ${(g.target-g.saved).toLocaleString()}₽`}</div>
                {pct<1&&<div style={{display:"flex",gap:8}}>{[500,1000,2000,5000].map(a=>(<button key={a} className="action-btn" onClick={()=>addGoalSaving(g.id,a)} style={{flex:1,padding:"8px 0",borderRadius:12,border:"2px solid rgba(100,180,120,.2)",background:"rgba(100,180,120,.04)",fontWeight:800,fontSize:12,color:"#4A7C5A",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>{a>=1000?`${a/1000}к`:a}₽</button>))}</div>}
                {g.saved>0&&<div style={{marginTop:12,padding:10,background:"rgba(255,217,61,.06)",borderRadius:12}}><div style={{fontSize:11,fontWeight:700,color:"#B8860B",marginBottom:4}}>🪙 Это:</div><div style={{fontSize:12,color:"#8A7B70",fontWeight:600}}>{g.saved>=200&&<span>☕{Math.floor(g.saved/200)}</span>}{g.saved>=500&&<span> 🍕{Math.floor(g.saved/500)}</span>}{g.saved>=1500&&<span> 🎬{Math.floor(g.saved/1500)}</span>}</div></div>}
              </div>)})}
            </div>
            <h2 style={{fontWeight:800,fontSize:isD?22:18,color:"#4A3728",marginBottom:isD?16:12}}>⚡ Челленджи</h2>
            <div style={{display:"grid",gridTemplateColumns:g3,gap:isD?16:12,marginBottom:isD?32:20}}>
              {CHALLENGES.map(c=>{const a=activeCh[c.id];return(<div key={c.id} style={C}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,rgba(255,217,61,.15),rgba(255,179,71,.1))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{c.emoji}</div><div style={{flex:1}}><div style={{fontWeight:800,fontSize:14,color:"#4A3728"}}>{c.title}</div><div style={{fontSize:11,color:"#8A7B70",fontWeight:600}}>{c.desc} • {c.days}д.</div><div style={{fontSize:11,color:"#64B478",fontWeight:700}}>~{c.savingsEst.toLocaleString()}₽</div></div></div>
                <div style={{marginTop:10}}>{!a?<button className="action-btn" onClick={()=>startCh(c)} style={{width:"100%",...B("#FFB347"),padding:"8px 0",fontSize:12}}>Начать</button>:<><div style={{height:6,background:"rgba(0,0,0,.05)",borderRadius:3,overflow:"hidden",marginBottom:8}}><div style={{width:`${a.progress/a.total*100}%`,height:"100%",background:"linear-gradient(90deg,#64B478,#A8E6CF)",borderRadius:3}}/></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:800,color:"#64B478"}}>{a.progress}/{a.total}</span><button className="action-btn" onClick={()=>tickCh(c.id)} style={{...B("#64B478"),padding:"6px 14px",fontSize:11}}>+1 ✓</button></div></>}</div>
              </div>)})}
            </div>
            <h2 style={{fontWeight:800,fontSize:isD?22:18,color:"#4A3728",marginBottom:isD?16:12}}>🏆 Достижения</h2>
            <div style={{display:"grid",gridTemplateColumns:isW?"repeat(6,1fr)":isD?"repeat(3,1fr)":"1fr 1fr",gap:isD?16:10}}>
              {ACHIEVEMENTS.map(a=>{const u=unlockedAch.includes(a.id);return(<div key={a.id} style={{padding:16,borderRadius:16,background:u?"white":"rgba(0,0,0,.02)",border:u?"2px solid rgba(255,217,61,.3)":"1px solid rgba(0,0,0,.05)",opacity:u?1:.45,textAlign:"center"}}><div style={{fontSize:32,filter:u?"none":"grayscale(1)",marginBottom:6}}>{a.emoji}</div><div style={{fontSize:13,fontWeight:800,color:u?"#4A3728":"#A89080"}}>{a.title}</div><div style={{fontSize:11,color:"#A89080",fontWeight:600}}>{a.desc}</div></div>)})}
            </div>
          </div>}

          </div>

          {/* MODALS */}
          {showNewHabit&&<Modal onClose={()=>setShowNewHabit(false)}>
            <div style={{fontWeight:800,fontSize:18,color:"#4A3728",marginBottom:16}}>✨ Новая привычка</div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>Эмодзи</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["💡","🎯","📱","🍳","🚲","🏃","📖","🧘","🛒"].map(e=>(<button key={e} onClick={()=>setNewHabit(p=>({...p,emoji:e}))} style={{width:42,height:42,borderRadius:12,fontSize:20,border:newHabit.emoji===e?"2px solid #E8899A":"2px solid rgba(0,0,0,.06)",background:newHabit.emoji===e?"rgba(232,137,154,.08)":"white",cursor:"pointer"}}>{e}</button>))}</div></div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>Название *</label><input value={newHabit.title} onChange={e=>setNewHabit(p=>({...p,title:e.target.value}))} placeholder="Готовить обед дома" style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:14,fontWeight:600,outline:"none"}}/></div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>Описание</label><textarea value={newHabit.desc} onChange={e=>setNewHabit(p=>({...p,desc:e.target.value}))} rows={2} style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:13,fontWeight:600,outline:"none",resize:"none"}}/></div>
            <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>₽/мес</label><input type="number" value={newHabit.savingsPerMonth||""} onChange={e=>setNewHabit(p=>({...p,savingsPerMonth:e.target.value}))} placeholder="3000" style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:14,fontWeight:600,outline:"none"}}/></div>
            <div style={{display:"flex",gap:10}}><button onClick={()=>setShowNewHabit(false)} style={{flex:1,padding:"12px 0",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",background:"white",fontWeight:800,fontSize:14,color:"#8A7B70",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Отмена</button><button className="action-btn" onClick={addCustom} style={{flex:2,padding:"12px 0",borderRadius:14,border:"none",background:"linear-gradient(135deg,#FFB5C2,#E8899A)",fontWeight:800,fontSize:14,color:"white",cursor:"pointer",fontFamily:"'Nunito',sans-serif",opacity:newHabit.title.trim()?1:.5}}>Создать 🎉</button></div>
          </Modal>}

          {showNewGoal&&<Modal onClose={()=>setShowNewGoal(false)}>
            <div style={{fontWeight:800,fontSize:18,color:"#4A3728",marginBottom:16}}>🎯 Новая цель</div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>Эмодзи</label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["🎯","✈️","📱","🚗","🏠","💻","👗","🎓","🛡️"].map(e=>(<button key={e} onClick={()=>setNewGoal(p=>({...p,emoji:e}))} style={{width:42,height:42,borderRadius:12,fontSize:20,border:newGoal.emoji===e?"2px solid #E8899A":"2px solid rgba(0,0,0,.06)",background:newGoal.emoji===e?"rgba(232,137,154,.08)":"white",cursor:"pointer"}}>{e}</button>))}</div></div>
            <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>На что? *</label><input value={newGoal.title} onChange={e=>setNewGoal(p=>({...p,title:e.target.value}))} placeholder="Отпуск" style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:14,fontWeight:600,outline:"none"}}/></div>
            <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:700,color:"#8A7B70",marginBottom:4,display:"block"}}>Сумма ₽ *</label><input type="number" value={newGoal.target} onChange={e=>setNewGoal(p=>({...p,target:e.target.value}))} placeholder="150000" style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:14,fontWeight:600,outline:"none"}}/></div>
            <div style={{display:"flex",gap:10}}><button onClick={()=>setShowNewGoal(false)} style={{flex:1,padding:"12px 0",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",background:"white",fontWeight:800,fontSize:14,color:"#8A7B70",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Отмена</button><button className="action-btn" onClick={createGoal} style={{flex:2,padding:"12px 0",borderRadius:14,border:"none",background:"linear-gradient(135deg,#64B478,#4A9C62)",fontWeight:800,fontSize:14,color:"white",cursor:"pointer",fontFamily:"'Nunito',sans-serif",opacity:(newGoal.title.trim()&&newGoal.target)?1:.5}}>Создать 🎯</button></div>
          </Modal>}

          {showAddExp&&<Modal onClose={()=>setShowAddExp(false)}>
            <div style={{fontWeight:800,fontSize:18,color:"#4A3728",marginBottom:16}}>📒 Трата</div>
            <div style={{marginBottom:12}}><input type="number" value={newExp.amount} onChange={e=>setNewExp(p=>({...p,amount:e.target.value}))} placeholder="350₽" style={{width:"100%",padding:"12px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:20,fontWeight:700,outline:"none",textAlign:"center"}}/></div>
            <div style={{marginBottom:12}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{EXPENSE_CATEGORIES.map(c=>(<button key={c.id} onClick={()=>setNewExp(p=>({...p,category:c.id}))} style={{padding:"10px 0",borderRadius:12,border:newExp.category===c.id?"2px solid #E8899A":"2px solid rgba(0,0,0,.06)",background:newExp.category===c.id?"rgba(232,137,154,.08)":"white",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:12,color:"#5A5045"}}><div style={{fontSize:20}}>{c.emoji}</div>{c.name}</button>))}</div></div>
            <div style={{marginBottom:16}}><input value={newExp.note} onChange={e=>setNewExp(p=>({...p,note:e.target.value}))} placeholder="Заметка" style={{width:"100%",padding:"10px 14px",borderRadius:14,border:"2px solid rgba(0,0,0,.08)",fontSize:14,fontWeight:600,outline:"none"}}/></div>
            <button className="action-btn" onClick={addExpense} style={{width:"100%",padding:"12px 0",borderRadius:14,border:"none",background:"linear-gradient(135deg,#E8899A,#D4738A)",fontWeight:800,fontSize:14,color:"white",cursor:"pointer",fontFamily:"'Nunito',sans-serif",opacity:newExp.amount?1:.5}}>Записать 📝</button>
          </Modal>}

          {/* MOBILE BOTTOM NAV */}
          {!isD&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(0,0,0,.06)",display:"flex",justifyContent:"space-around",padding:"6px 0 18px",zIndex:50}}>
            {TABS.map(t=>(<button key={t.id} className="nav-btn" onClick={()=>setScreen(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"6px 12px"}}><span style={{fontSize:20,filter:screen===t.id?"none":"grayscale(.5)",transform:screen===t.id?"scale(1.15)":"scale(1)",transition:"all .2s ease"}}>{t.emoji}</span><span style={{fontSize:9,fontWeight:800,color:screen===t.id?"#E8899A":"#B0A598"}}>{t.label}</span>{screen===t.id&&<div style={{width:4,height:4,borderRadius:2,background:"#E8899A",marginTop:1}}/>}</button>))}
          </div>}
        </div>
      )
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
